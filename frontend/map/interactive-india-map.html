<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactive India Map</title>
  <link rel="icon" type="image/x-icon" href="/public/Misinfo.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            saffron: { DEFAULT: '#E87722', light: '#FF9933' },
            green: { DEFAULT: '#138808', light: '#1ea50e' },
            navy: '#000080',
            bg: '#0f172a',
            panel: '#0b1220',
            accent: '#3b82f6',
          },
        }
      }
    }
  </script>
</head>
<body class="m-0 font-sans bg-[#0f172a] text-[#e2e8f0] flex h-screen overflow-hidden overflow-x-hidden max-w-screen">
  <div id="left" class="flex flex-col flex-1">
    <header class="px-4 py-3 lg:px-4 lg:py-4 bg-gradient-to-r from-[rgba(255,255,255,0.02)] to-transparent flex gap-3 lg:gap-4 items-center">
      <h1 class="text-lg lg:text-[18px] m-0 font-outfit font-extrabold text-white">Interactive India Map</h1>
      <div class="controls flex-1 flex gap-2 lg:gap-3 items-center">
        <input id="search" type="search" placeholder="Search state (e.g. Karnataka)" class="flex-1 px-3 py-2 lg:px-3 lg:py-2 rounded-[8px] border border-[rgba(255,255,255,0.06)] bg-[rgba(255,255,255,0.02)] text-[#e2e8f0] placeholder-[#64748b] text-sm lg:text-[13px] focus:outline-none focus:border-[rgba(59,130,246,0.3)]" />
        <button id="reset" class="bg-transparent border border-[rgba(255,255,255,0.06)] px-3 py-2 lg:px-3 lg:py-2 rounded-[8px] text-[#e2e8f0] cursor-pointer hover:bg-[rgba(255,255,255,0.05)] transition-colors text-sm lg:text-[12px] font-medium">Reset</button>
      </div>
    </header>
    <div id="mapwrap" class="flex-1 overflow-hidden relative">
      <div id="svgroot" class="w-full h-full touch-action-none cursor-grab bg-gradient-to-b from-[#071027] to-[#082035]">Loading map...</div>
      <div id="tooltip" class="absolute pointer-events-none px-3 py-2.5 bg-white text-[#041026] rounded-[6px] text-[13px] shadow-[0_6px_18px_rgba(4,8,16,0.6)] hidden z-50 max-w-[250px] leading-relaxed"></div>
    </div>
  </div>
  <aside class="w-[320px] bg-[#0b1220] border-l border-[rgba(255,255,255,0.03)] px-4.5 py-4.5 lg:px-[18px] lg:py-[18px] overflow-y-auto">
    <div class="state-name text-xl lg:text-[20px] font-semibold mb-1.5 text-white font-outfit" id="stateName">Click a state</div>
    <div class="meta text-[13px] opacity-85 text-[#94a3b8] leading-relaxed mb-3" id="stateDesc">State description will appear here. Hover or click a state on the map.</div>
    <div class="legend mt-3 text-[13px] text-[#94a3b8]" id="legend"></div>
    <div class="hint mt-4.5 opacity-70 text-[13px] text-[#94a3b8] leading-relaxed">Use mouse wheel to zoom, drag to pan. On mobile: pinch to zoom (if supported).</div>
    <footer class="pt-3 text-[12px] opacity-80 text-[#64748b]">Files required: <code class="bg-[rgba(255,255,255,0.05)] px-1.5 py-0.5 rounded text-[#3b82f6]">in.svg</code> and <code class="bg-[rgba(255,255,255,0.05)] px-1.5 py-0.5 rounded text-[#3b82f6]">mapdata.js</code> in same folder.</footer>
  </aside>

  <script>
    // Basic utility and UI
    const svgRoot = document.getElementById('svgroot');
    const tooltip = document.getElementById('tooltip');
    const stateNameEl = document.getElementById('stateName');
    const stateDescEl = document.getElementById('stateDesc');
    const searchInput = document.getElementById('search');
    const resetBtn = document.getElementById('reset');

    // We'll load the SVG file (in.svg) and inject it so we can attach listeners
    async function loadSVG(){
      try{
        const res = await fetch('in.svg');
        if(!res.ok) throw new Error('SVG not found. Put in.svg beside this HTML file.');
        const text = await res.text();
        svgRoot.innerHTML = text;
        initMap();
      }catch(e){
        svgRoot.innerHTML = '<div class="p-[18px] text-salmon">Error loading in.svg: '+e.message+'</div>';
      }
    }

    // Load optional mapdata.js (user provided). It should define simplemaps_countrymap_mapdata
    function loadMapData(){
      return new Promise((resolve)=>{
        if(window.simplemaps_countrymap_mapdata){
          resolve(window.simplemaps_countrymap_mapdata);
        }else{
          // try to dynamically load mapdata.js
          const s = document.createElement('script');
          s.src = 'mapdata.js';
          s.onload = ()=> resolve(window.simplemaps_countrymap_mapdata || {});
          s.onerror = ()=> resolve({});
          document.head.appendChild(s);
        }
      })
    }

    // Map interaction state (pan/zoom)
    let scale = 1, tx = 0, ty = 0;
    let isPanning = false, startX=0, startY=0;
    let svgEl;
    let mapData = {};
    let selectedEl = null;

    function initMap(){
      // find the actual <svg>
      svgEl = svgRoot.querySelector('svg');
      if(!svgEl){ svgRoot.innerHTML = '<div class="p-4.5 text-red-400 font-medium">in.svg does not contain an &lt;svg&gt; root.</div>'; return; }
      // wrap paths with class map-path for styling
      const paths = svgEl.querySelectorAll('path, polygon, rect, circle');
      paths.forEach(p => {
        if(!p.id) return;
        p.classList.add('map-path');
        p.classList.add('fill-[#88A4BC]');
        p.classList.add('stroke-[#ffffff]');
        p.classList.add('stroke-width-[0.6]');
        p.classList.add('transition');
        p.classList.add('duration-200');
        p.classList.add('ease-in-out');
      });
      
      // Add hover effect via JavaScript since we can't use CSS hover on dynamically added elements
      paths.forEach(p => {
        p.addEventListener('mouseenter', () => {
          p.classList.add('fill-[#3B729F]');
        });
        p.addEventListener('mouseleave', () => {
          if (!p.classList.contains('selected')) {
            p.classList.remove('fill-[#3B729F]');
          }
        });
      });

      // initial transform group
      let g = document.createElementNS('http://www.w3.org/2000/svg','g');
      // move all children into g
      while(svgEl.firstChild){ g.appendChild(svgEl.firstChild); }
      svgEl.appendChild(g);
      svgEl.dataset.viewbox = svgEl.getAttribute('viewBox') || '';

      // pan/zoom handlers
      svgRoot.addEventListener('wheel', e=>{
        e.preventDefault();
        const delta = -e.deltaY * 0.001;
        const oldScale = scale;
        scale = Math.min(8, Math.max(0.5, scale * (1 + delta)));
        // zoom towards cursor
        const rect = svgRoot.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        tx -= (cx/oldScale - cx/scale);
        ty -= (cy/oldScale - cy/scale);
        updateTransform();
      }, {passive:false});

      svgRoot.addEventListener('mousedown', e=>{
        isPanning = true; startX = e.clientX; startY = e.clientY; svgRoot.style.cursor='grabbing';
      });
      window.addEventListener('mousemove', e=>{
        if(!isPanning) return;
        tx += (e.clientX - startX)/scale; ty += (e.clientY - startY)/scale; startX = e.clientX; startY = e.clientY; updateTransform();
      });
      window.addEventListener('mouseup', ()=>{ isPanning=false; svgRoot.style.cursor='grab'; });

      // load map data and attach state listeners
      loadMapData().then(md=>{
        mapData = md || {};
        attachStateHandlers();
      });

      // pointer hover for tooltip
      svgRoot.addEventListener('mousemove', e=>{
        const t = e.target;
        if(t && t.classList && t.classList.contains('map-path')){
          const id = t.id;
          const info = lookupStateInfo(id);
          showTooltip(e.clientX, e.clientY, info.name+(info.desc?('\n'+info.desc):''));
        } else { hideTooltip(); }
      });

      svgRoot.addEventListener('mouseleave', hideTooltip);

      // click to select
      svgRoot.addEventListener('click', e=>{
        const t = e.target;
        if(t && t.classList && t.classList.contains('map-path')){
          selectState(t.id, t);
        }
      });

      // search
      searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
      resetBtn.addEventListener('click', resetView);
    }

    function updateTransform(){
      const g = svgEl.querySelector('g');
      g.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
    }

    function showTooltip(cx, cy, html){
      tooltip.style.display='block';
      tooltip.innerText = html;
      const mapRect = svgRoot.getBoundingClientRect();
      const left = Math.min(mapRect.width - 180, Math.max(8, cx - mapRect.left + 12));
      const top = Math.max(8, cy - mapRect.top + 12);
      tooltip.style.left = left+'px'; tooltip.style.top = top+'px';
    }
    function hideTooltip(){ tooltip.style.display='none'; }

    function lookupStateInfo(id){
      const empty = {name:id || 'Unknown', desc:''};
      if(!id) return empty;
      if(mapData && mapData.state_specific && mapData.state_specific[id]){
        const s = mapData.state_specific[id];
        return {name: s.name || id, desc: (s.description && s.description!=='default')?s.description:''};
      }
      // fallback: try matching by common names
      return {name: id, desc:''};
    }

    function selectState(id, el){
      if(selectedEl) {
        selectedEl.classList.remove('selected');
        selectedEl.style.fill = '#88A4BC';
      }
      selectedEl = el;
      selectedEl.classList.add('selected');
      selectedEl.style.fill = '#3b82f6';
      const info = lookupStateInfo(id);
      stateNameEl.innerText = info.name || id;
      stateDescEl.innerText = info.desc || (mapData.main_settings && mapData.main_settings.state_description) || 'No description available.';
    }

    function attachStateHandlers(){
      // populate legend from mapData if available
      if(mapData && mapData.legend && Array.isArray(mapData.legend.entries) && mapData.legend.entries.length){
        const legend = document.getElementById('legend');
        legend.innerHTML = '<strong>Legend</strong><br>' + mapData.legend.entries.join(', ');
      }

      // add pointer cursors
      const paths = svgEl.querySelectorAll('.map-path');
      paths.forEach(p=>{
        p.style.cursor='pointer';
        // attempt to set title attribute for accessibility
        const info = lookupStateInfo(p.id);
        p.setAttribute('data-name', info.name||p.id);
        // if SVG path has no fill set or fill=none, set a default fill
        if(!p.getAttribute('fill') || p.getAttribute('fill')==='none'){
          p.setAttribute('fill','#88A4BC');
        }
        // Add hover effect
        p.addEventListener('mouseenter', () => {
          if (!p.classList.contains('selected')) {
            p.style.fill = '#3B729F';
          }
        });
        p.addEventListener('mouseleave', () => {
          if (!p.classList.contains('selected')) {
            p.style.fill = '#88A4BC';
          }
        });
      });
    }

    function doSearch(){
      const q = searchInput.value.trim().toLowerCase();
      if(!q) return;
      // try to find a state in mapdata
      const m = mapData.state_specific || {};
      for(const k of Object.keys(m)){
        const name = (m[k].name||'').toLowerCase();
        if(name.includes(q) || k.toLowerCase()===q){
          // find element with id k
          const el = svgEl.querySelector('#'+CSS.escape(k));
          if(el){
            // center view on bbox
            const bbox = el.getBBox();
            // simple centering: move translate so bbox is roughly center
            const rect = svgRoot.getBoundingClientRect();
            const cx = bbox.x + bbox.width/2; const cy = bbox.y + bbox.height/2;
            // compute desired tx/ty so that cx,cy appear near center of container
            const targetScreenX = rect.width/2; const targetScreenY = rect.height/2;
            tx = targetScreenX/scale - cx; ty = targetScreenY/scale - cy;
            updateTransform();
            selectState(k, el);
            return;
          }
        }
      }
      alert('No state found for "'+q+'"');
    }

    function resetView(){ scale = 1; tx = 0; ty = 0; updateTransform(); if(selectedEl) { selectedEl.classList.remove('selected'); selectedEl=null; stateNameEl.innerText='Click a state'; stateDescEl.innerText='State description will appear here.'} }

    // initial load
    loadSVG();
  </script>
</body>
</html>
